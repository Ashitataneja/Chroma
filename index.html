<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chroma</title>

<style>
body { margin:0; font-family:-apple-system; }

/* GRID */
#grid {
  display:grid;
  grid-template-columns:repeat(30,1fr);
  width:100vw;
  height:100vh;
}
.color { width:100%; aspect-ratio:1; }

/* PANEL */
#panel {
  position:fixed;
  right:0; top:0;
  width:360px;
  height:100%;
  background:white;
  transform:translateX(100%);
  transition:.3s;
  display:flex;
  flex-direction:column;
  z-index:10;
}
#panel.active { transform:translateX(0); }

#content { flex:1; overflow:auto; padding:20px; }

#back { cursor:pointer; margin-bottom:10px; }

#preview {
  height:120px;
  border-radius:10px;
  margin-bottom:10px;
}

label { font-size:12px; }
input { width:100%; }

/* IMAGES */
#gallery {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:6px;
}
#gallery img {
  width:100%;
  height:90px;
  object-fit:cover;
  border-radius:6px;
  cursor:pointer;
}

/* BUTTON */
#bottom {
  padding:15px;
  border-top:1px solid #eee;
}
#captureMood {
  width:100%;
  padding:12px;
  background:black;
  color:white;
  border:none;
  border-radius:8px;
}

/* CAMERA */
#overlay {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.6);
  display:none;
  justify-content:center;
  align-items:center;
}
#overlay.active { display:flex; }

#modal {
  width:95%;
  max-width:420px;
  height:80vh;
  background:black;
  border-radius:12px;
  overflow:hidden;
  position:relative;
}

video, canvas {
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
}

/* CLOSE */
#closeCam {
  position:absolute;
  top:10px;
  right:10px;
  width:32px;
  height:32px;
  border:none;
  border-radius:50%;
  background:white;
}

/* IMAGE STRIP */
#camGallery {
  position:absolute;
  bottom:80px;
  display:flex;
  gap:8px;
  overflow-x:auto;
  padding:8px;
}
#camGallery img {
  width:60px;
  height:60px;
  border-radius:8px;
  object-fit:cover;
}

/* CONTROLS */
#controls {
  position:absolute;
  bottom:10px;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:0 10px;
}

#captureBtn {
  flex:1;
  margin-right:10px;
  padding:10px;
  border:none;
  border-radius:8px;
  background:white;
}

#download {
  width:50px;
  border:none;
  border-radius:8px;
  background:white;
  display:none;
}
</style>
</head>

<body>

<div id="grid"></div>

<div id="panel">
  <div id="content">

    <div id="back">← Back</div>

    <div id="preview"></div>

    <label>Hue</label>
    <input type="range" id="hue" min="0" max="360">

    <label>Saturation</label>
    <input type="range" id="sat" min="0" max="100">

    <label>Vibrance</label>
    <input type="range" id="vib" min="0" max="100">

    <h4>Inspiration</h4>
    <div id="gallery"></div>

  </div>

  <div id="bottom">
    <button id="captureMood">Capture Mood</button>
  </div>
</div>

<!-- CAMERA -->
<div id="overlay">
  <div id="modal">

    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <button id="closeCam">✕</button>

    <div id="camGallery"></div>

    <div id="controls">
      <button id="captureBtn">Capture</button>

      <button id="download">
        <svg width="20" height="20" viewBox="0 0 24 24">
          <path d="M12 3v12m0 0l4-4m-4 4l-4-4M4 17v3h16v-3"
          stroke="black" stroke-width="2" fill="none"/>
        </svg>
      </button>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>

<script src="script.js"></script>

</body>
</html>
