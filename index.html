<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Chroma</title>

<style>
  html, body {
    margin: 0;
    height: 100%;
    overflow: hidden;
    font-family: sans-serif;
    background: #fafafa;
  }

  #grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(20px, 1fr));
    height: 100vh;
  }

  .color {
    width: 100%;
    aspect-ratio: 1/1;
    cursor: pointer;
    transition: transform 0.15s ease;
  }

  .color:hover {
    transform: scale(1.3);
    z-index: 2;
  }

  #panel {
    position: fixed;
    right: -360px;
    top: 0;
    width: 360px;
    height: 100%;
    background: white;
    box-shadow: -10px 0 30px rgba(0,0,0,0.1);
    padding: 20px;
    transition: right 0.3s ease;
    overflow-y: auto;
  }

  #panel.active {
    right: 0;
  }

  #closePanel {
    position: absolute;
    top: 10px;
    right: 10px;
    border: none;
    background: #eee;
    border-radius: 50%;
    width: 30px;
    height: 30px;
    cursor: pointer;
  }

  #preview {
    width: 100%;
    height: 140px;
    border-radius: 12px;
    margin-bottom: 12px;
  }

  input[type="range"] {
    width: 100%;
  }

  #gallery {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
  }

  #gallery img {
    width: 100%;
    height: 80px;
    object-fit: cover;
    border-radius: 8px;
  }

  video, canvas {
    width: 100%;
    margin-top: 10px;
    border-radius: 10px;
  }

  button, a {
    margin-top: 10px;
    width: 100%;
    padding: 8px;
    background: black;
    color: white;
    border: none;
    text-align: center;
    cursor: pointer;
    display: block;
  }
</style>
</head>

<body>

<div id="grid"></div>

<div id="panel">
  <button id="closePanel">✕</button>

  <div id="preview"></div>
  <p id="hex"></p>
  <p id="hsl"></p>

  <label>Hue</label>
  <input type="range" id="hue" min="0" max="360">

  <label>Saturation</label>
  <input type="range" id="sat" min="0" max="100">

  <label>Lightness</label>
  <input type="range" id="light" min="0" max="100">

  <h3>Mood</h3>
  <p id="description"></p>
  <ul id="keywords"></ul>

  <h3>Inspiration</h3>
  <div id="gallery"></div>

  <h3>Camera</h3>
  <video id="video" autoplay playsinline></video>
  <button id="capture">Capture</button>
  <canvas id="canvas"></canvas>
  <a id="download" download="chroma.png">Download</a>
</div>

<script src="./script.js"></script>

</body>
</html>
