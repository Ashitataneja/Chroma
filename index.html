<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chroma</title>

<style>
body { margin:0; font-family:-apple-system; background:#111; }

/* GRID */
#grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(18px,1fr));
  height:100vh;
}
.color { aspect-ratio:1; cursor:pointer; }

/* PANEL */
#panel {
  position:fixed;
  right:0; top:0;
  width:360px; height:100%;
  background:#fff;
  transform:translateX(100%);
  transition:.3s;
  display:flex;
  flex-direction:column;
}
#panel.active { transform:translateX(0); }

#content { flex:1; overflow:auto; padding:20px; }

#preview { height:120px; border-radius:10px; margin-bottom:10px; }

label { font-size:12px; margin-top:10px; display:block; }

input { width:100%; }

#gallery {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:6px;
  margin-top:10px;
}
#gallery img {
  width:100%; height:70px;
  object-fit:cover;
  border-radius:6px;
  cursor:pointer;
}

/* BOTTOM CTA */
#bottom {
  padding:15px;
  border-top:1px solid #eee;
}
#captureMood {
  width:100%;
  padding:12px;
  background:black;
  color:white;
  border:none;
  border-radius:8px;
}

/* MODAL */
#overlay {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.8);
  display:none;
}
#overlay.active { display:block; }

#modal {
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
}

video {
  width:100%;
  height:100%;
  object-fit:cover;
}

canvas {
  position:absolute;
  inset:0;
}

#ui {
  position:absolute;
  bottom:0;
  width:100%;
  padding:10px;
  background:linear-gradient(transparent, rgba(0,0,0,0.7));
}

#controls {
  display:flex;
  gap:8px;
}

#controls button {
  flex:1;
  padding:10px;
  border:none;
  background:white;
  border-radius:6px;
}

#closeCam {
  position:absolute;
  top:15px;
  right:15px;
  background:white;
  border:none;
  width:30px;
  height:30px;
  border-radius:50%;
}
</style>
</head>

<body>

<div id="grid"></div>

<!-- SIDE PANEL -->
<div id="panel">
  <div id="content">
    <div id="preview"></div>

    <label>Hue</label>
    <input type="range" id="hue" min="0" max="360">

    <label>Saturation</label>
    <input type="range" id="sat" min="0" max="100">

    <label>Lightness</label>
    <input type="range" id="light" min="0" max="100">

    <h4>Inspiration</h4>
    <div id="gallery"></div>
  </div>

  <div id="bottom">
    <button id="captureMood">Capture Mood</button>
  </div>
</div>

<!-- CAMERA -->
<div id="overlay">
  <div id="modal">

    <video id="video" autoplay></video>
    <canvas id="canvas"></canvas>

    <button id="closeCam">✕</button>

    <div id="ui">
      <div id="controls">
        <button id="capture">Capture</button>
        <button id="download">Download</button>
      </div>
    </div>

  </div>
</div>

<script src="./script.js"></script>
</body>
</html>
