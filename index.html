<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chroma</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: -apple-system;
}

/* FULL GRID */
#grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(24px, 1fr));
  width: 100vw;
  height: 100vh;
}

.color {
  width: 100%;
  height: 100%;
}

/* PANEL */
#panel {
  position: fixed;
  right: 0;
  top: 0;
  width: 340px;
  height: 100%;
  background: white;
  transform: translateX(100%);
  transition: 0.3s;
  display: flex;
  flex-direction: column;
}

#panel.active {
  transform: translateX(0);
}

#content {
  flex: 1;
  overflow: auto;
  padding: 16px;
}

#preview {
  height: 100px;
  border-radius: 10px;
}

/* GALLERY */
#gallery {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px;
}

#gallery img {
  width: 100%;
  height: 80px;
  object-fit: cover;
}

/* CAMERA */
#overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.8);
  display: none;
  justify-content: center;
  align-items: center;
}

#overlay.active {
  display: flex;
}

#modal {
  width: 90%;
  max-width: 420px;
  height: 80vh;
  background: black;
  border-radius: 12px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

video, canvas {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* TOP IMAGE STRIP */
#camGallery {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding: 6px;
}

#camGallery img {
  width: 60px;
  height: 60px;
  border-radius: 6px;
}

/* SLIDER */
#camHue {
  width: 100%;
}
</style>
</head>

<body>

<div id="grid"></div>

<div id="panel">
  <div id="content">
    <div id="preview"></div>

    <input type="range" id="hue" min="0" max="360">

    <div id="gallery"></div>
  </div>

  <button id="captureMood">Capture Mood</button>
</div>

<div id="overlay">
  <div id="modal">
    <video id="video" autoplay></video>
    <canvas id="canvas"></canvas>

    <div id="camGallery"></div>
    <input type="range" id="camHue" min="0" max="360">

    <button id="download">Download</button>
  </div>
</div>

<script src="script.js"></script>

</body>
</html>
