<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Chroma</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, sans-serif;
  background: #111;
}

/* GRID */
#grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(18px, 1fr));
  height: 100vh;
}

.color {
  aspect-ratio: 1;
  cursor: pointer;
}

/* PANEL */
#panel {
  position: fixed;
  right: 0;
  top: 0;
  width: 360px;
  height: 100%;
  background: white;
  transform: translateX(100%);
  transition: 0.3s ease;
  display: flex;
  flex-direction: column;
}

#panel.active {
  transform: translateX(0);
}

#panelContent {
  padding: 20px;
  overflow-y: auto;
  flex: 1;
}

#close {
  position: absolute;
  right: 15px;
  top: 15px;
  border: none;
  background: #eee;
  border-radius: 50%;
  width: 30px;
  height: 30px;
  cursor: pointer;
}

#preview {
  height: 120px;
  border-radius: 10px;
  margin-bottom: 10px;
}

/* SLIDERS */
label {
  font-size: 12px;
  margin-top: 10px;
  display: block;
}

input[type="range"] {
  width: 100%;
}

/* GALLERY */
#gallery {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px;
  margin-top: 10px;
}

#gallery img {
  width: 100%;
  height: 70px;
  object-fit: cover;
  border-radius: 6px;
  cursor: pointer;
}

/* CTA */
#bottomBar {
  padding: 15px;
  border-top: 1px solid #eee;
}

#captureMood {
  width: 100%;
  padding: 12px;
  background: black;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

/* MODAL CAMERA */
#overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  display: none;
  align-items: center;
  justify-content: center;
}

#overlay.active {
  display: flex;
}

#modal {
  width: 90%;
  max-width: 500px;
  background: black;
  border-radius: 12px;
  overflow: hidden;
}

video, canvas {
  width: 100%;
  height: 300px;
  object-fit: cover;
}

#modalControls {
  display: flex;
  gap: 8px;
  padding: 10px;
}

#modalControls button {
  flex: 1;
  padding: 10px;
  border: none;
  background: white;
  cursor: pointer;
  border-radius: 6px;
}
</style>
</head>

<body>

<div id="grid"></div>

<!-- PANEL -->
<div id="panel">
  <button id="close">✕</button>

  <div id="panelContent">
    <div id="preview"></div>

    <label>Hue</label>
    <input type="range" id="hue" min="0" max="360">

    <label>Saturation</label>
    <input type="range" id="sat" min="0" max="100">

    <label>Lightness</label>
    <input type="range" id="light" min="0" max="100">

    <h4>Inspiration</h4>
    <div id="gallery"></div>
  </div>

  <div id="bottomBar">
    <button id="captureMood">Capture Mood</button>
  </div>
</div>

<!-- CAMERA MODAL -->
<div id="overlay">
  <div id="modal">
    <video id="video" autoplay></video>
    <canvas id="canvas"></canvas>

    <div id="modalControls">
      <button id="capture">Capture</button>
      <button id="download">Download</button>
      <button id="closeCam">Close</button>
    </div>
  </div>
</div>

<script src="./script.js"></script>

</body>
</html>
