<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chroma</title>

<style>
body { margin:0; font-family:-apple-system; background:#111; }

/* GRID FIXED */
#grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(30px,1fr));
  gap:0;
  height:100vh;
}
.color {
  width:100%;
  height:100%;
  cursor:pointer;
}

/* PANEL */
#panel {
  position:fixed;
  right:0; top:0;
  width:360px; height:100%;
  background:#fff;
  transform:translateX(100%);
  transition:.3s;
  display:flex;
  flex-direction:column;
}
#panel.active { transform:translateX(0); }

#content { flex:1; overflow:auto; padding:20px; }

#back { font-size:20px; cursor:pointer; margin-bottom:10px; }

#preview {
  height:120px;
  border-radius:10px;
}

/* SLIDERS */
label { font-size:12px; margin-top:10px; display:block; }
input { width:100%; }

/* GALLERY */
#gallery {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:6px;
  margin-top:10px;
}
#gallery img {
  width:100%; height:80px;
  object-fit:cover;
  border-radius:6px;
  cursor:pointer;
}

/* CTA */
#bottom { padding:15px; border-top:1px solid #eee; }
#captureMood {
  width:100%;
  padding:12px;
  background:black;
  color:white;
  border:none;
  border-radius:8px;
}

/* CAMERA */
#overlay {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.7);
  display:none;
  align-items:center;
  justify-content:center;
}
#overlay.active { display:flex; }

#modal {
  width:95%;
  max-width:420px;
  background:black;
  border-radius:12px;
  overflow:hidden;
  position:relative;
}

video, canvas {
  width:100%;
  height:320px;
  object-fit:cover;
}

/* TOP IMAGE STRIP */
#camGallery {
  display:flex;
  overflow-x:auto;
  gap:8px;
  padding:8px;
  background:black;
}
#camGallery img {
  width:60px;
  height:60px;
  border-radius:8px;
  object-fit:cover;
  cursor:pointer;
}

/* COLOR BAR */
#colorBar {
  width:100%;
  height:20px;
  background:linear-gradient(to right, red, yellow, green, cyan, blue, magenta, red);
}
#camHue {
  width:100%;
}

/* BUTTONS */
#controls {
  display:flex;
  gap:8px;
  padding:10px;
}
#controls button {
  flex:1;
  padding:10px;
  border:none;
  background:white;
  border-radius:6px;
}

#closeCam {
  position:absolute;
  top:10px;
  right:10px;
  background:white;
  border:none;
  border-radius:50%;
  width:30px;
  height:30px;
}
</style>
</head>

<body>

<div id="grid"></div>

<div id="panel">
  <div id="content">
    <div id="back">←</div>

    <div id="preview"></div>

    <label>Hue</label>
    <input type="range" id="hue" min="0" max="360">

    <label>Saturation</label>
    <input type="range" id="sat" min="0" max="100">

    <label>Lightness</label>
    <input type="range" id="light" min="0" max="100">

    <h4>Inspiration</h4>
    <div id="gallery"></div>
  </div>

  <div id="bottom">
    <button id="captureMood">Capture Mood</button>
  </div>
</div>

<!-- CAMERA -->
<div id="overlay">
  <div id="modal">

    <video id="video" autoplay></video>
    <canvas id="canvas"></canvas>

    <button id="closeCam">✕</button>

    <!-- IMAGE STRIP -->
    <div id="camGallery"></div>

    <!-- COLOR BAR -->
    <div id="colorBar"></div>
    <input type="range" id="camHue" min="0" max="360">

    <div id="controls">
      <button id="download">Download</button>
    </div>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
