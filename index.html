<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chroma</title>

<style>
body { margin:0; font-family:-apple-system; background:#111; }

/* GRID */
#grid {
  display:grid;
  grid-template-columns:repeat(20,1fr);
  grid-template-rows:repeat(20,1fr);
  width:100vw;
  height:100vh;
}
.color { width:100%; height:100%; cursor:pointer; }

/* PANEL */
#panel {
  position:fixed;
  right:0; top:0;
  width:360px;
  height:100%;
  background:white;
  transform:translateX(100%);
  transition:.3s;
  display:flex;
  flex-direction:column;
  z-index:10;
}
#panel.active { transform:translateX(0); }

#content { flex:1; overflow:auto; padding:20px; }

#back { font-size:20px; cursor:pointer; }

#preview {
  height:120px;
  border-radius:10px;
  margin:10px 0;
}

label { font-size:12px; margin-top:10px; display:block; }
input { width:100%; }

/* GALLERY */
#gallery {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:6px;
}
#gallery img {
  width:100%;
  height:90px;
  object-fit:cover;
  border-radius:6px;
  cursor:pointer;
}

/* CTA */
#bottom {
  padding:15px;
  border-top:1px solid #eee;
}
#captureMood {
  width:100%;
  padding:12px;
  background:black;
  color:white;
  border:none;
  border-radius:8px;
}

/* CAMERA */
#overlay {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.6);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:20;
}
#overlay.active { display:flex; }

#modal {
  width:95%;
  max-width:420px;
  height:80vh;
  background:black;
  border-radius:12px;
  overflow:hidden;
  position:relative;
  display:flex;
  flex-direction:column;
}

/* VIDEO + CANVAS */
#videoWrapper {
  position:relative;
  flex:1;
}
video, canvas {
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
}

/* CLOSE BUTTON */
#closeCam {
  position:absolute;
  top:10px;
  right:10px;
  width:32px;
  height:32px;
  border-radius:50%;
  border:none;
  background:white;
  font-size:16px;
  z-index:5;
}

/* IMAGE STRIP */
#camGallery {
  display:flex;
  gap:8px;
  overflow-x:auto;
  padding:8px;
  background:black;
}
#camGallery img {
  width:60px;
  height:60px;
  border-radius:8px;
}

/* SLIDERS */
#cameraControls {
  padding:10px;
  background:black;
}
#cameraControls input {
  width:100%;
}

/* BUTTONS */
#controls {
  display:flex;
  gap:8px;
  padding:10px;
}
#controls button {
  flex:1;
  padding:10px;
  border:none;
  background:white;
  border-radius:6px;
}
</style>
</head>

<body>

<div id="grid"></div>

<div id="panel">
  <div id="content">

    <div id="back">←</div>

    <div id="preview"></div>

    <label>Hue</label>
    <input type="range" id="hue" min="0" max="360">

    <label>Saturation</label>
    <input type="range" id="sat" min="0" max="100">

    <label>Vibrance</label>
    <input type="range" id="vib" min="0" max="100">

    <h4>Inspiration</h4>
    <div id="gallery"></div>

  </div>

  <div id="bottom">
    <button id="captureMood">Capture Mood</button>
  </div>
</div>

<!-- CAMERA -->
<div id="overlay">
  <div id="modal">

    <div id="videoWrapper">
      <video id="video" autoplay></video>
      <canvas id="canvas"></canvas>
    </div>

    <button id="closeCam">✕</button>

    <div id="camGallery"></div>

    <div id="cameraControls">
      <input type="range" id="camHue" min="0" max="360">
      <input type="range" id="camSat" min="0" max="100">
      <input type="range" id="camVib" min="0" max="100">
    </div>

    <div id="controls">
      <button id="capture">Capture</button>
      <button id="download">Download</button>
    </div>

  </div>
</div>

<script src="script.js"></script>

</body>
</html>
