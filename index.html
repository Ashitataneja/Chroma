<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Chroma</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, sans-serif;
  background: #0f0f0f;
}

/* GRID */
#grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(20px, 1fr));
  height: 100vh;
}

.color {
  aspect-ratio: 1;
  cursor: pointer;
  transition: transform 0.15s ease;
}

.color:hover {
  transform: scale(1.3);
  z-index: 2;
}

/* PANEL */
#panel {
  position: fixed;
  top: 0;
  right: 0;
  width: 380px;
  height: 100%;
  background: #ffffff;
  transform: translateX(100%);
  transition: transform 0.35s ease;
  padding: 20px;
  box-shadow: -10px 0 30px rgba(0,0,0,0.2);
  overflow-y: auto;
}

#panel.active {
  transform: translateX(0);
}

#close {
  position: absolute;
  right: 15px;
  top: 15px;
  border: none;
  background: #eee;
  border-radius: 50%;
  width: 32px;
  height: 32px;
  cursor: pointer;
}

#preview {
  height: 140px;
  border-radius: 14px;
  margin-bottom: 10px;
}

input[type="range"] {
  width: 100%;
}

/* CTA */
#captureMood {
  margin-top: 20px;
  width: 100%;
  padding: 12px;
  border: none;
  background: black;
  color: white;
  font-weight: bold;
  border-radius: 10px;
  cursor: pointer;
}

/* CAMERA VIEW */
#cameraView {
  position: fixed;
  inset: 0;
  background: black;
  display: none;
  flex-direction: column;
  z-index: 999;
}

#cameraView.active {
  display: flex;
}

video, canvas {
  width: 100%;
  height: 70%;
  object-fit: cover;
}

/* GALLERY */
#gallery {
  display: flex;
  overflow-x: scroll;
  gap: 10px;
  padding: 10px;
}

#gallery img {
  height: 80px;
  width: 80px;
  object-fit: cover;
  border-radius: 10px;
  cursor: pointer;
  border: 2px solid transparent;
}

#gallery img.active {
  border: 2px solid white;
}

#controls {
  display: flex;
  gap: 10px;
  padding: 10px;
}

button {
  flex: 1;
  padding: 10px;
  border: none;
  background: white;
  cursor: pointer;
  border-radius: 8px;
}
</style>
</head>

<body>

<div id="grid"></div>

<!-- PANEL -->
<div id="panel">
  <button id="close">✕</button>
  <div id="preview"></div>

  <input type="range" id="hue" min="0" max="360">
  <input type="range" id="sat" min="0" max="100">
  <input type="range" id="light" min="0" max="100">

  <button id="captureMood">Capture Mood</button>
</div>

<!-- CAMERA VIEW -->
<div id="cameraView">
  <video id="video" autoplay playsinline></video>
  <canvas id="canvas"></canvas>

  <div id="gallery"></div>

  <div id="controls">
    <button id="capture">Capture</button>
    <button id="download">Download</button>
    <button id="closeCam">Close</button>
  </div>
</div>

<script src="./script.js"></script>
</body>
</html>
