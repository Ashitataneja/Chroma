<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Chroma</title>

  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      font-family: sans-serif;
    }

    #grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(20px, 1fr));
      height: 100vh;
    }

    .color {
      width: 100%;
      aspect-ratio: 1 / 1;
      cursor: pointer;
      transition: transform 0.1s ease;
    }

    .color:hover {
      transform: scale(1.2);
      z-index: 2;
    }

    /* PANEL */
    #panel {
      position: fixed;
      right: -320px;
      top: 0;
      width: 320px;
      height: 100%;
      background: white;
      box-shadow: -5px 0 15px rgba(0,0,0,0.1);
      padding: 20px;
      transition: right 0.3s ease;
      overflow-y: auto;
    }

    #panel.active {
      right: 0;
    }

    #preview {
      width: 100%;
      height: 150px;
      border-radius: 10px;
      margin-bottom: 20px;
    }

    #hex, #hsl {
      font-size: 14px;
      margin: 8px 0;
    }

    .controls {
      margin-top: 15px;
    }

    label {
      font-size: 12px;
      display: block;
      margin-top: 10px;
    }

    input[type="range"] {
      width: 100%;
      accent-color: black;
    }

    /* MOOD */
    #mood {
      margin-top: 20px;
    }

    #mood h3 {
      margin-bottom: 8px;
      font-size: 14px;
    }

    #description {
      font-size: 13px;
      margin-bottom: 10px;
      line-height: 1.4;
    }

    #keywords {
      padding-left: 18px;
      font-size: 13px;
    }
  </style>
</head>
<body>

  <div id="grid"></div>

  <div id="panel">
    <div id="preview"></div>
    <p id="hex"></p>
    <p id="hsl"></p>

    <div class="controls">
      <label>Hue</label>
      <input type="range" id="hue" min="0" max="360">

      <label>Saturation</label>
      <input type="range" id="sat" min="0" max="100">

      <label>Lightness</label>
      <input type="range" id="light" min="0" max="100">
    </div>

    <!-- AI Mood -->
    <div id="mood">
      <h3>Mood</h3>
      <p id="description">Click a color to generate mood...</p>
      <ul id="keywords"></ul>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
