<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Chroma</title>

<style>
  html, body {
    margin: 0;
    height: 100%;
    overflow: hidden;
    font-family: sans-serif;
    background: #fafafa;
  }

  #grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(20px, 1fr));
    height: 100vh;
  }

  .color {
    width: 100%;
    aspect-ratio: 1 / 1;
    cursor: pointer;
    transition: transform 0.15s ease;
  }

  .color:hover {
    transform: scale(1.3);
    z-index: 2;
  }

  /* PANEL */
  #panel {
    position: fixed;
    right: -340px;
    top: 0;
    width: 340px;
    height: 100%;
    background: white;
    box-shadow: -10px 0 30px rgba(0,0,0,0.1);
    padding: 20px;
    transition: right 0.3s ease;
    overflow-y: auto;
  }

  #panel.active {
    right: 0;
  }

  #closePanel {
    position: absolute;
    top: 10px;
    right: 10px;
    border: none;
    background: #f0f0f0;
    border-radius: 50%;
    width: 30px;
    height: 30px;
    cursor: pointer;
  }

  #preview {
    width: 100%;
    height: 140px;
    border-radius: 12px;
    margin-bottom: 16px;
  }

  #hex, #hsl {
    font-size: 14px;
    margin: 6px 0;
  }

  label {
    font-size: 12px;
    margin-top: 10px;
    display: block;
  }

  input[type="range"] {
    width: 100%;
  }

  #mood {
    margin-top: 20px;
  }

  #description {
    font-size: 13px;
    margin-bottom: 10px;
  }

  #keywords {
    padding-left: 18px;
    font-size: 13px;
  }
</style>
</head>

<body>

<div id="grid"></div>

<div id="panel">
  <button id="closePanel">✕</button>

  <div id="preview"></div>
  <p id="hex"></p>
  <p id="hsl"></p>

  <label>Hue</label>
  <input type="range" id="hue" min="0" max="360">

  <label>Saturation</label>
  <input type="range" id="sat" min="0" max="100">

  <label>Lightness</label>
  <input type="range" id="light" min="0" max="100">

  <div id="mood">
    <h3>Mood</h3>
    <p id="description"></p>
    <ul id="keywords"></ul>
  </div>
</div>

<script src="script.js"></script>

</body>
</html>
